<!DOCTYPE html>
<html>
<head><style>body{margin:0;}</style></head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004D2C"/>
      <stop offset="50%" style="stop-color:#006B3F"/>
      <stop offset="100%" style="stop-color:#008F5A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" rx="0" fill="url(#bg)"/>
  <rect width="1200" height="8" fill="#E8B030"/>
  <rect y="622" width="1200" height="8" fill="#E8B030"/>
  <!-- Pattern dots -->
  <g fill="rgba(255,255,255,0.05)">
    <circle cx="50" cy="50" r="3"/><circle cx="100" cy="50" r="3"/><circle cx="150" cy="50" r="3"/>
    <circle cx="200" cy="50" r="3"/><circle cx="250" cy="50" r="3"/><circle cx="300" cy="50" r="3"/>
    <circle cx="50" cy="100" r="3"/><circle cx="100" cy="100" r="3"/><circle cx="150" cy="100" r="3"/>
    <circle cx="50" cy="150" r="3"/><circle cx="100" cy="150" r="3"/>
  </g>
  <!-- White card -->
  <rect x="60" y="60" width="1080" height="510" rx="20" fill="rgba(255,255,255,0.97)"/>
  <!-- Brand -->
  <text x="120" y="160" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="800" fill="#006B3F">🦜 ParrotNG</text>
  <!-- Tagline -->
  <text x="120" y="240" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="600" fill="#333">What Nigerians Really Think</text>
  <!-- Divider -->
  <rect x="120" y="270" width="120" height="4" rx="2" fill="#E8B030"/>
  <!-- Features -->
  <text x="120" y="340" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#555">📊 Vote on trending Nigerian topics</text>
  <text x="120" y="390" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#555">💬 Join the national debate</text>
  <text x="120" y="440" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#555">🗳️ See what millions really think</text>
  <!-- CTA -->
  <rect x="120" y="480" width="260" height="52" rx="26" fill="#006B3F"/>
  <text x="168" y="514" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#fff">Join Now — It's Free</text>
  <!-- Flag -->
  <text x="1020" y="520" font-family="Inter, system-ui, sans-serif" font-size="64">🇳🇬</text>
</svg>
</body>
</html>
